name: Update SCO downloads shields in readmes, then sync to adamlui/userscripts

on:
  workflow_dispatch:
  schedule:
    - cron: "28 5 * * 3" # every Wed @ 5:28 AM

jobs:
  update-root-downloads-shields:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      TZ: PST8PDT

    steps:
      - name: Checkout adamlui/youtube-classic
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          path: adamlui/youtube-classic

      - name: Checkout adamlui/userscripts
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          repository: adamlui/userscripts
          path: adamlui/userscripts

      - name: Fetch/sum downloads count
        run: |
          format_total() {
            local num=$1 ; first_digit="${num:0:1}" second_digit="${num:1:1}"
            second_digit_rounded=$(( second_digit < 5 ? 0 : 5 ))
            if (( num >= 1000000000 )) ; then # 1B+ w/ one decimal place
              formatted_num="$(( num / 1000000000 ))"
              remainder=$(( (num % 1000000000) / 100000000 ))
              if (( remainder != 0 )) ; then formatted_num+=".$remainder" ; fi
              formatted_num+="B+"
            elif (( num >= 10000000 )) ; then # abbr 10,000,000+ to 999,000,000+
              formatted_num=$(printf "%'.f+" $((( num / 1000000 ) * 1000000 )))
            elif (( num >= 1000000 )) ; then # abbr 1,000,000+ to 9,500,000+
              formatted_num="${first_digit},${second_digit}00,000+"
            elif (( num >= 100000 )) ; then # abbr 100,000+ to 950,000+
              formatted_num="${first_digit}${second_digit_rounded}0,000+"
            elif (( num >= 10000 )) ; then # abbr 10,000+ to 90,000+
              formatted_num="${first_digit}0,000+"
            elif (( num >= 1000 )) ; then # abbr 1K to 9.9K
              formatted_num="$(( num / 1000 ))"
              remainder=$(( (num % 1000) / 100 ))
              if (( remainder != 0 )) ; then formatted_num+=".$remainder" ; fi
              formatted_num+="K"
            else formatted_num="$num" ; fi # preserve <1K as is
            echo "$formatted_num"
          }

          raw_sco_dls=$(curl -s https://scriptcat.org/en/script-show-page/6345 |
            grep -oP '<span class="ant-statistic-content-value-int">\K[0-9,]+' | head -1 | tr -d ',')
          echo "Raw SCO downloads: $raw_sco_dls"

          formatted_sco_dls=$(format_total "$raw_sco_dls")
          echo "Formatted SCO downloads: $formatted_sco_dls"
          echo "TOTAL_SCO_DLS=$formatted_sco_dls" >> $GITHUB_ENV

      - name: Update README shields
        run: |
          cd ${{ github.workspace }}/adamlui/youtube-classic
          TOTAL_SCO_DLS="${{ env.TOTAL_SCO_DLS }}"
          if [ -z "$TOTAL_SCO_DLS" ] || [ "$TOTAL_SCO_DLS" = "0" ] ; then
            echo "Error: couldn't get install count"
            exit 1
          fi
          shields_updated=false
          for readme in $(find . -name "README.md") ; do
            old_readme=$(<"$readme")
            sed -i "s/\(Downloads-\)[0-9.,KMBkmb+]\+\(-af68ff\)/\1${TOTAL_SCO_DLS}\2/gI" "$readme"
            new_readme=$(<"$readme")
            if [[ "$old_readme" != "$new_readme" ]] ; then
              shields_updated=true ; echo "Updated: $readme" ; fi
          done
          if [ "$shields_updated" = true ] ; then
            echo "SHIELDS_UPDATED=true" >> $GITHUB_ENV
          else
            echo "Shields already up-to-date"
          fi

      - name: Sync /greasemonkey to adamlui/userscripts/youtube-classic/
        run: |
          rsync -avhc --delete \
            ${{ github.workspace }}/adamlui/youtube-classic/greasemonkey/ \
            ${{ github.workspace }}/adamlui/userscripts/youtube-classic/

      - name: Config committer
        if: env.SHIELDS_UPDATED == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_ID: ${{ secrets.GPG_PRIVATE_ID }}
        run: |
          gpg --batch --import <(echo "$GPG_PRIVATE_KEY")
          git config --global commit.gpgsign true
          git config --global user.name "kudo-sync-bot"
          git config --global user.email "auto-sync@kudoai.com"
          git config --global user.signingkey "$GPG_PRIVATE_ID"

      - name: Push changes to adamlui/youtube-classic
        if: env.SHIELDS_UPDATED == 'true'
        run: |
          cd ${{ github.workspace }}/adamlui/youtube-classic
          git add . && git commit -n -m "Updated downloads shield counters in readmes" || true
          git pull --rebase 
          git push

      - name: Push changes to adamlui/userscripts
        if: env.SHIELDS_UPDATED == 'true'
        run: |
          cd ${{ github.workspace }}/adamlui/userscripts
          git add . && git commit -n -m \
            "Updated downloads shield counters in readmes \
              ↞ [auto-sync from https://github.com/adamlui/youtube-classic]" || true
          git pull --rebase 
          git push

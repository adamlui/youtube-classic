name: Validate links on push + PR

on:
  push:
    paths: ['**/*.md']
  pull_request:
    paths: ['**/*.md']
  workflow_dispatch:

jobs:
  linkinator:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: JustinBeckwith/linkinator-action@931839f49ccc9f63af7d490949d89be9ddf7042b # v2.4.4
        with:
          paths: '**/*.md'
          statusCodes: '{ "408": "skip", "429": "skip", "504": "skip" }'
